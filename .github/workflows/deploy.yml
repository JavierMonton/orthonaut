name: Build frontend and publish deploy branch

# On every push to main, build the React frontend and publish
#   deploy = (main source) + (built frontend/dist)
# Toolforge builds its container image from the `deploy` branch
# (`toolforge build start <repo> --ref deploy`), embedding frontend/dist into the
# Rust release binary via rust-embed. This keeps generated artifacts off `main`.

on:
  push:
    branches: [main]

# Avoid overlapping runs racing to force-push `deploy`.
concurrency:
  group: deploy-branch
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  publish-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Publish deploy branch
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Reset `deploy` to current main + a single dist commit, then force-push.
          # Force-add because frontend/dist is gitignored on main.
          git checkout -B deploy
          git add -f frontend/dist
          git commit -m "build frontend dist for deploy [skip ci]"
          git push -f origin deploy
